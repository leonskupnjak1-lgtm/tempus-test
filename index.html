<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0a1815" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tempus Pool — bazeni projektirani kao arhitektura, izgrađeni kao obrt. Privatni bazeni, vodena tehnika i cjeloživotna njega za domove diljem Istre." />
    <title>Tempus Pool — Bazeni kao arhitektura. Umag, Istra.</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tempus Pool" />
    <meta property="og:title" content="Tempus Pool — Bazeni kao arhitektura. Umag, Istra." />
    <meta property="og:description" content="Tempus Pool — bazeni projektirani kao arhitektura, izgrađeni kao obrt. Privatni bazeni, vodena tehnika i cjeloživotna njega za domove diljem Istre." />
    <!-- TODO: update to production domain alongside SITE_URL in src/lib/site.js -->
    <meta property="og:url" content="https://tempus-test.vercel.app" />
    <meta property="og:image" content="https://tempus-test.vercel.app/og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="hr_HR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tempus Pool — Bazeni kao arhitektura. Umag, Istra." />
    <meta name="twitter:description" content="Tempus Pool — bazeni projektirani kao arhitektura, izgrađeni kao obrt. Privatni bazeni, vodena tehnika i cjeloživotna njega za domove diljem Istre." />
    <meta name="twitter:image" content="https://tempus-test.vercel.app/og.jpg" />

    <!-- Fonts are self-hosted (see src/fonts.css, generated by
         scripts/fetch-fonts.mjs) — preload the two files that gate the
         hero's first paint: the display face (headline) and the body face. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/fraunces-300-normal-latin-ext.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/manrope-400-normal-latin-ext.woff2" crossorigin />

    <!-- LCP element on every viewport (see Hero.jsx). Most visitors get the
         scroll-scrubbed canvas, whose base layer is the sequence's own first
         frame (hero-001) — not hero-poster.jpg, which is the *finished* pool
         shot and would otherwise flash in before the frames load. Only the
         prefers-reduced-motion / frame-load-failure fallback still uses the
         finished-pool poster, so it's preloaded conditionally on that query. -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="/frames-mobile/hero-001.webp"
      fetchpriority="high"
      media="(max-width: 767px) and (prefers-reduced-motion: no-preference)"
    />
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="/frames/hero-001.webp"
      fetchpriority="high"
      media="(min-width: 768px) and (prefers-reduced-motion: no-preference)"
    />
    <link
      rel="preload"
      as="image"
      type="image/jpeg"
      href="/hero-poster.jpg"
      fetchpriority="high"
      media="(prefers-reduced-motion: reduce)"
    />

    <!-- Test-domain safeguard: this build is also reachable at *.vercel.app
         previews. Keep those out of search results so they never compete
         with the production domain once it's live.
         TODO: delete this whole script tag once SITE_URL in src/lib/site.js
         points at the production domain — the two changes go together. -->
    <script>
      if (/\.vercel\.app$/.test(window.location.hostname)) {
        var m = document.createElement("meta");
        m.name = "robots";
        m.content = "noindex, nofollow";
        document.head.appendChild(m);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
